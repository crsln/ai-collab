name: CI

on:
  push:
    branches: [main, feature/rust-rewrite]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all

  build:
    needs: check
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ai-collab-server.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ai-collab-server
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ai-collab-server
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ai-collab-server
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ai-collab-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-collab-x86_64-pc-windows-msvc/ai-collab-server.exe
            ai-collab-x86_64-unknown-linux-gnu/ai-collab-server
            ai-collab-x86_64-apple-darwin/ai-collab-server
            ai-collab-aarch64-apple-darwin/ai-collab-server
          generate_release_notes: true
